name: Build IPA

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ipa:
    name: Build NXBoot IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          brew install ldid
          gem install xcpretty

      - name: Build IPA
        run: |
          set -euo pipefail

          # Extract version info
          version=$(xcodebuild -project NXBoot.xcodeproj -scheme NXBoot -showBuildSettings 2>/dev/null | grep MARKETING_VERSION | head -1 | awk -F' = ' '{print $2}')
          buildno=$(xcodebuild -project NXBoot.xcodeproj -scheme NXBoot -showBuildSettings 2>/dev/null | grep CURRENT_PROJECT_VERSION | head -1 | awk -F' = ' '{print $2}')
          bundleid="com.mologie.NXBoot"

          echo "Version: $version Build: $buildno"

          # Build
          xcodebuild \
            -project NXBoot.xcodeproj \
            -scheme NXBoot \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Manual \
            2>&1 | xcpretty

          # Prepare IPA
          releasedir="build/DerivedData/NXBoot/Build/Products/Release-iphoneos"
          rm -f "$releasedir/NXBoot.app/embedded.mobileprovision"

          ldid -I"$bundleid" -Cadhoc -SNXBoot/NXBootJailbreak.entitlements "$releasedir/NXBoot.app/NXBoot"

          rm -rf DerivedData/ipa
          mkdir -p DerivedData/ipa/Payload
          ditto "$releasedir/NXBoot.app" DerivedData/ipa/Payload/NXBoot.app

          # Create dist directory
          mkdir -p dist
          tipa="dist/NXBoot_${version}-${buildno}.tipa"
          rm -f "$tipa"
          (cd DerivedData/ipa && COPYFILE_DISABLE=1 zip -r "../../$tipa" "Payload" -x "._*" -x ".DS_Store" -x "__MACOSX")

          # Export dSYM
          mkdir -p dist
          ditto "$releasedir/NXBoot.app.dSYM" "dist/NXBoot_${version}-${buildno}.app.dSYM"

          echo "IPA built: $tipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: NXBoot-IPA
          path: |
            dist/*.tipa
            dist/*.app.dSYM
          retention-days: 30

  release:
    name: Create Release
    needs: build-ipa
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: NXBoot-IPA
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tipa
            dist/*.app.dSYM
          generate_release_notes: true
          draft: false
          prerelease: false
