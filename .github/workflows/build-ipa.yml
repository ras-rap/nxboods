name: Build IPA

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ipa:
    name: Build NXBoot IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          brew install ldid

      - name: Build IPA
        run: |
          set -euo pipefail

          version=$(xcodebuild -project NXBoot.xcodeproj -scheme NXBoot -showBuildSettings 2>/dev/null | grep MARKETING_VERSION | head -1 | awk -F' = ' '{print $2}')
          buildno=$(xcodebuild -project NXBoot.xcodeproj -scheme NXBoot -showBuildSettings 2>/dev/null | grep CURRENT_PROJECT_VERSION | head -1 | awk -F' = ' '{print $2}')
          bundleid="com.mologie.NXBoot"

          echo "Version: $version Build: $buildno"

          DERIVED_DATA="$PWD/build/DerivedData"

          xcodebuild \
            -project NXBoot.xcodeproj \
            -scheme NXBoot \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$DERIVED_DATA" \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Manual \
            2>&1 | tee xcodebuild.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "xcodebuild failed, showing last 100 lines:"
            tail -n 100 xcodebuild.log
            exit 1
          fi

          releasedir="$DERIVED_DATA/Build/Products/Release-iphoneos"

          # Fail fast with a clear error if paths are wrong
          test -f "NXBoot/NXBootJailbreak.entitlements"
          test -f "$releasedir/NXBoot.app/NXBoot"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: NXBoot-IPA
          path: |
            dist/*.tipa
            dist/*.app.dSYM
          retention-days: 30

  release:
    name: Create Release
    needs: build-ipa
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: NXBoot-IPA
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tipa
            dist/*.app.dSYM
          generate_release_notes: true
          draft: false
          prerelease: false
